<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | StaffSync</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#C41E1E;--red-hover:#A81818;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#080202;cursor:none;
}
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 15%,rgba(196,30,30,0.4) 0%,transparent 55%),
    radial-gradient(ellipse 60% 80% at 85% 85%,rgba(120,10,10,0.35) 0%,transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%,#150303 0%,#080202 100%);
}
#canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
#cur{
  position:fixed;width:10px;height:10px;
  background:#fff;border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  transition:opacity 0.2s;
}
#cur.hidden{opacity:0;}

/* HIDE CURSOR ON TOUCH DEVICES */
@media(hover:none),(pointer:coarse){
  #cur{display:none!important;}
  body{cursor:auto!important;}
  .inp,.btn,.eye{cursor:auto!important;}
}

#card-wrap{
  position:relative;z-index:10;
  transform-style:preserve-3d;
  perspective:1000px;
  will-change:transform;
}
.card{
  width:400px;padding:48px 40px 40px;
  border-radius:24px;
  background:rgba(255,255,255,0.055);
  backdrop-filter:blur(48px) saturate(180%);
  -webkit-backdrop-filter:blur(48px) saturate(180%);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 24px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);
  border-radius:24px 24px 0 0;pointer-events:none;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:radial-gradient(circle 180px at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.06) 0%,transparent 70%);
  pointer-events:none;opacity:0;transition:opacity 0.3s;
}
.card.lit::after{opacity:1;}
.card.lit{
  border-color:rgba(255,255,255,0.18);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 24px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(196,30,30,0.12),
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(255,255,255,0.06);
}
.logo{
  width:44px;height:44px;background:transparent;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  box-shadow:none;
  animation:pop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  overflow:hidden;
}
.logo img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.logo span{color:#fff;font-weight:800;font-size:22px;letter-spacing:-0.04em;}
.title{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400;font-size:38px;letter-spacing:-0.01em;color:#C41E1E;-webkit-text-fill-color:#C41E1E;text-shadow:0 0 32px rgba(196,30,30,0.4);text-align:center;animation:up 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
.sub{font-size:12px;color:rgba(255,255,255,0.35);text-align:center;margin-top:4px;animation:up 0.6s cubic-bezier(0.16,1,0.3,1) 0.28s both;}
.ig{position:relative;margin-top:22px;animation:up 0.6s cubic-bezier(0.16,1,0.3,1) 0.38s both;}
.ig+.ig{margin-top:12px;animation-delay:0.44s;}
.ig label{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:7px;}
.inp{
  width:100%;height:48px;padding:0 42px 0 16px;
  border-radius:12px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);
  font-family:inherit;font-size:14px;color:#fff;outline:none;
  transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;
  cursor:none;
}
.inp::placeholder{color:rgba(255,255,255,0.25);}
.inp:focus{
  border-color:rgba(196,30,30,0.6);background:rgba(255,255,255,0.08);
  box-shadow:0 0 0 3px rgba(196,30,30,0.12),0 0 20px rgba(196,30,30,0.08);
}
.eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:none;
  color:rgba(255,255,255,0.25);display:flex;align-items:center;
  transition:color 0.2s;padding:4px;
}
.eye:hover,.eye.on{color:var(--red);}
.btn{
  width:100%;height:50px;margin-top:20px;
  background:var(--red);color:#fff;border:none;
  border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;
  letter-spacing:-0.01em;cursor:none;position:relative;overflow:hidden;
  box-shadow:0 0 28px rgba(196,30,30,0.45),0 4px 12px rgba(196,30,30,0.3);
  transition:background 0.2s,transform 0.2s cubic-bezier(0.34,1.2,0.64,1),box-shadow 0.2s;
  animation:up 0.6s cubic-bezier(0.16,1,0.3,1) 0.54s both;
}
.btn:hover{background:var(--red-hover);transform:translateY(-2px);box-shadow:0 0 48px rgba(196,30,30,0.55),0 8px 24px rgba(196,30,30,0.35);}
.btn:active{transform:scale(0.97);}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:rpl 0.6s linear;pointer-events:none;}
@keyframes rpl{to{transform:scale(4);opacity:0;}}
.inv{text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,0.18);animation:up 0.6s cubic-bezier(0.16,1,0.3,1) 0.6s both;}
.err{font-size:11px;color:#ff6b6b;text-align:center;margin-top:8px;min-height:16px;}
.ok{display:none;font-size:11px;color:#4ade80;text-align:center;margin-top:8px;}
footer{position:fixed;bottom:16px;left:0;right:0;text-align:center;z-index:10;font-size:10px;color:rgba(255,255,255,0.12);}
#toast{
  position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);color:#fff;
  padding:10px 20px;border-radius:99px;font-size:12px;font-weight:500;
  opacity:0;transition:all 0.35s cubic-bezier(0.34,1.2,0.64,1);
  z-index:9999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes pop{from{opacity:0;transform:scale(0.5) rotate(-15deg);}to{opacity:1;transform:scale(1) rotate(0);}}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0) translateY(var(--fy,0px));}20%{transform:translateX(-10px) translateY(var(--fy,0px));}40%{transform:translateX(10px) translateY(var(--fy,0px));}60%{transform:translateX(-6px) translateY(var(--fy,0px));}80%{transform:translateX(6px) translateY(var(--fy,0px));}}
.shake{animation:shake 0.4s ease!important;}

/* PAGE TRANSITION */
#page-transition{
  position:fixed;inset:0;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:#080202;
  opacity:0;pointer-events:none;transition:opacity 0.5s ease;
}
#page-transition.show{opacity:1;pointer-events:all;}
.pt-logo{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400;font-size:42px;color:#C41E1E;letter-spacing:-0.01em;text-shadow:0 0 40px rgba(196,30,30,0.6);opacity:0;transform:scale(0.85);animation:ptLogoIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;}
.pt-msg{font-size:13px;font-weight:500;color:rgba(255,255,255,0.4);letter-spacing:0.02em;opacity:0;animation:ptMsgIn 0.5s ease 0.5s forwards;}
.pt-bar{width:120px;height:2px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-top:4px;opacity:0;animation:ptMsgIn 0.5s ease 0.6s forwards;}
.pt-fill{height:100%;background:var(--red);border-radius:99px;width:0%;box-shadow:0 0 12px rgba(196,30,30,0.8);transition:width 1.2s cubic-bezier(0.16,1,0.3,1);}
.pt-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.pt-dot{position:absolute;border-radius:50%;background:#C41E1E;animation:ptDot linear infinite;}
@keyframes ptLogoIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes ptMsgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes ptDot{0%{transform:translateY(110vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:0.6;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}

/* RESPONSIVE */
@media(max-width:440px){
  #card-wrap{padding:0 16px;width:100%;}
  .card{width:100%;padding:36px 24px 32px;}
  .title{font-size:28px;}
  .inp{font-size:16px;}
}
@media(max-width:360px){
  .card{padding:28px 16px 28px;}
  .title{font-size:24px;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div id="page-transition">
  <div class="pt-particles" id="pt-particles"></div>
  <div class="pt-logo">StaffSync</div>
  <div class="pt-msg" id="pt-msg">Signing in...</div>
  <div class="pt-bar"><div class="pt-fill" id="pt-fill"></div></div>
</div>
<canvas id="canvas"></canvas>
<div id="cur"></div>
<div id="toast"></div>
<div id="card-wrap">
  <div class="card" id="card">
    <div class="logo">
      <img src="treffer_logo.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
      <span style="display:none">T</span>
    </div>
    <div class="title">StaffSync</div>
    <div class="sub">Treffer Technologies &mdash; HR Portal</div>
    <form id="form" onsubmit="doLogin(event)" autocomplete="off">
      <div class="ig">
        <label>Login ID</label>
        <input class="inp" id="lid" type="text" placeholder="TRF-DSG-001" autocomplete="off" autocapitalize="characters" spellcheck="false"/>
      </div>
      <div class="ig">
        <label>Password</label>
        <input class="inp" id="pw" type="password" placeholder="Password" autocomplete="off" style="padding-right:42px"/>
        <button type="button" class="eye" id="eyebtn" onclick="togglePw()">
          <svg id="eyeico" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="err" id="err"></div>
      <div class="ok" id="ok">Credentials verified! Redirecting...</div>
      <button type="submit" class="btn" id="sbtn">Sign In</button>
    </form>
    <div class="inv">Forgot password? Contact your Admin Officer</div>
  </div>
</div>
<footer>
  <span style="font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400;color:#C41E1E;letter-spacing:-0.01em;">StaffSync</span>
  &middot; Powered by Treffer Technologies
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
// PARTICLES
const cv=document.getElementById('canvas');
const ct=cv.getContext('2d');
let W,H;
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
let MX=W/2,MY=H/2;
document.addEventListener('mousemove',e=>{MX=e.clientX;MY=e.clientY;});
class P{
  constructor(){this.r();}
  r(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-0.5)*0.25;this.vy=(Math.random()-0.5)*0.25;
    this.maxLife=Math.random()*250+150;this.age=0;
    this.rad=Math.random()*1.2+0.4;
    this.col=Math.random()>0.55?'196,30,30':'255,100,100';
  }
  step(){
    const dx=MX-this.x,dy=MY-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<180){this.vx+=(dx/d)*0.035;this.vy+=(dy/d)*0.035;}
    else{this.vx+=(Math.random()-0.5)*0.008;this.vy+=(Math.random()-0.5)*0.008;}
    this.vx*=0.97;this.vy*=0.97;
    this.x+=this.vx;this.y+=this.vy;this.age++;
    if(this.age>this.maxLife||this.x<0||this.x>W||this.y<0||this.y>H)this.r();
  }
  draw(){
    const a=this.age/this.maxLife;
    const op=(a<0.1?a*10:a>0.9?(1-a)*10:1)*0.65;
    ct.beginPath();ct.arc(this.x,this.y,this.rad,0,Math.PI*2);
    ct.fillStyle='rgba('+this.col+','+op+')';
    ct.shadowColor='rgba(196,30,30,0.9)';ct.shadowBlur=this.rad*8;
    ct.fill();ct.shadowBlur=0;
  }
}
const pts=[];for(let i=0;i<100;i++)pts.push(new P());
function drawConn(){
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<75){ct.beginPath();ct.moveTo(pts[i].x,pts[i].y);ct.lineTo(pts[j].x,pts[j].y);ct.strokeStyle='rgba(196,30,30,'+(0.12*(1-d/75))+')';ct.lineWidth=0.5;ct.stroke();}
    }
    const dx=pts[i].x-MX,dy=pts[i].y-MY,d=Math.sqrt(dx*dx+dy*dy);
    if(d<130){ct.beginPath();ct.moveTo(pts[i].x,pts[i].y);ct.lineTo(MX,MY);ct.strokeStyle='rgba(255,80,80,'+(0.28*(1-d/130))+')';ct.lineWidth=0.7;ct.stroke();}
  }
}
(function loop(){ct.clearRect(0,0,W,H);drawConn();pts.forEach(p=>{p.step();p.draw();});requestAnimationFrame(loop);})();

// CURSOR — desktop (mouse) only
const cur=document.getElementById('cur');
const isMouseDevice=window.matchMedia('(hover:hover) and (pointer:fine)').matches;
if(isMouseDevice){
  let curX=0,curY=0;
  document.addEventListener('mousemove',e=>{curX=e.clientX;curY=e.clientY;});
  (function cl(){cur.style.left=curX+'px';cur.style.top=curY+'px';requestAnimationFrame(cl);})();
  document.querySelectorAll('.inp').forEach(inp=>{
    inp.addEventListener('focus',()=>cur.classList.add('hidden'));
    inp.addEventListener('blur',()=>cur.classList.remove('hidden'));
  });
} else {
  cur.style.display='none';
  document.body.style.cursor='auto';
  document.querySelectorAll('.inp,.btn,.eye').forEach(el=>el.style.cursor='auto');
}

// GYROSCOPE 3D — boosted
const cw=document.getElementById('card-wrap');
const card=document.getElementById('card');
let near=false;
let floatT=0;
let gyroAng=0;
let tiltX=0,tiltY=0;
let curRX=0,curRY=0,curTY=0;

document.addEventListener('mousemove',e=>{
  const r=cw.getBoundingClientRect();
  const ccx=r.left+r.width/2,ccy=r.top+r.height/2;
  const d=Math.sqrt((e.clientX-ccx)**2+(e.clientY-ccy)**2);
  if(d<260){
    near=true;
    tiltX=(e.clientX-ccx)/(r.width/2)*10;
    tiltY=(e.clientY-ccy)/(r.height/2)*10;
    const lx=((e.clientX-r.left)/r.width*100).toFixed(1)+'%';
    const ly=((e.clientY-r.top)/r.height*100).toFixed(1)+'%';
    card.style.setProperty('--mx',lx);
    card.style.setProperty('--my',ly);
    card.classList.add('lit');
  } else {
    near=false;
    card.classList.remove('lit');
  }
});

(function animate(){
  if(near){
    curRX+=((-tiltY)-curRX)*0.12;
    curRY+=((tiltX)-curRY)*0.12;
    floatT+=0.015;
    curTY+=(Math.sin(floatT)*6-curTY)*0.05;
  } else {
    gyroAng+=0.012;
    const targetRX=Math.sin(gyroAng*0.7)*14;
    const targetRY=Math.cos(gyroAng)*18;
    curRX+=(targetRX-curRX)*0.04;
    curRY+=(targetRY-curRY)*0.04;
    floatT+=0.015;
    curTY+=(Math.sin(floatT)*14-curTY)*0.03;
  }
  cw.style.transform='translateY('+curTY.toFixed(2)+'px) rotateX('+curRX.toFixed(2)+'deg) rotateY('+curRY.toFixed(2)+'deg)';
  requestAnimationFrame(animate);
})();

// PASSWORD TOGGLE
function togglePw(){
  const p=document.getElementById('pw'),b=document.getElementById('eyebtn'),i=document.getElementById('eyeico');
  if(p.type==='password'){
    p.type='text';b.classList.add('on');
    i.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    p.type='password';b.classList.remove('on');
    i.innerHTML='<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// RIPPLE
document.getElementById('sbtn').addEventListener('click',function(e){
  const r=document.createElement('span');r.classList.add('ripple');
  const rc=this.getBoundingClientRect(),s=Math.max(rc.width,rc.height);
  r.style.cssText='width:'+s+'px;height:'+s+'px;left:'+(e.clientX-rc.left-s/2)+'px;top:'+(e.clientY-rc.top-s/2)+'px;position:absolute;';
  this.appendChild(r);setTimeout(()=>r.remove(),600);
});

// PAGE TRANSITION
function runTransition(msg,destination,delay){
  const overlay=document.getElementById('page-transition');
  const msgEl=document.getElementById('pt-msg');
  const fill=document.getElementById('pt-fill');
  const ptc=document.getElementById('pt-particles');
  ptc.innerHTML='';
  for(let i=0;i<24;i++){
    const d=document.createElement('div');
    d.className='pt-dot';
    const size=Math.random()*4+2;
    d.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:0;opacity:${Math.random()*0.6+0.2};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*0.8}s;box-shadow:0 0 ${size*4}px rgba(196,30,30,0.8);`;
    ptc.appendChild(d);
  }
  msgEl.textContent=msg;
  overlay.classList.add('show');
  fill.style.width='0%';
  setTimeout(()=>{fill.style.width='100%';},100);
  setTimeout(()=>{window.location.href=destination;},delay);
}

// TOAST
let tt;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);
}

// LOGIN
async function doLogin(e){
  e.preventDefault();
  const lid=document.getElementById('lid').value.trim().toUpperCase();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'),ok=document.getElementById('ok'),btn=document.getElementById('sbtn');
  err.textContent='';ok.style.display='none';
  if(!lid){err.textContent='Enter your Login ID.';cw.classList.add('shake');setTimeout(()=>cw.classList.remove('shake'),400);return;}
  if(!pw){err.textContent='Enter your password.';cw.classList.add('shake');setTimeout(()=>cw.classList.remove('shake'),400);return;}
  btn.textContent='Signing in...';btn.disabled=true;btn.style.opacity='0.7';
  try{
    const{data:users,error}=await db.from('users').select('*,employees(*)').eq('login_id',lid).eq('is_active',true);
    if(error||!users||users.length===0){
      err.textContent='Invalid Login ID or password.';
      cw.classList.add('shake');setTimeout(()=>cw.classList.remove('shake'),400);
      btn.textContent='Sign In';btn.disabled=false;btn.style.opacity='1';return;
    }
    const user=users[0];
    if(user.password!==pw){
      err.textContent='Invalid Login ID or password.';
      cw.classList.add('shake');setTimeout(()=>cw.classList.remove('shake'),400);
      btn.textContent='Sign In';btn.disabled=false;btn.style.opacity='1';return;
    }
    ok.style.display='block';
    setTimeout(()=>{
      btn.textContent='Signed In ✓';btn.style.background='#16A34A';
      btn.style.boxShadow='0 0 28px rgba(74,222,128,0.45)';btn.style.opacity='1';
      setUser({id:user.id,loginId:user.login_id,role:user.role,isFirstLogin:user.is_first_login,employeeId:user.employees?.id,fullName:user.employees?.full_name,department:user.employees?.department,designation:user.employees?.designation});
      runTransition(
        'Welcome back, '+(user.employees?.full_name||user.login_id)+'!',
        'dashboard.html',
        1800
      );
    },800);
  }catch(ex){
    err.textContent='Something went wrong. Try again.';
    btn.textContent='Sign In';btn.disabled=false;btn.style.opacity='1';
  }
}

if(getUser())window.location.href='dashboard.html';
</script>
